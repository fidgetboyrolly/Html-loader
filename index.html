<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>HTML Loader</title>
  <meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#000">
  <style>
    body {
      margin: 0;
      background: #000;
      color: #fff;
      font-family: system-ui, sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
    }
    input {
      margin-top: 12px;
    }
  </style>
</head>
<body>
  <h2>HTML Loader</h2>
  <p>Select an HTML or WebArchive file:</p>
<input type="file" accept="*/*" onchange="loadFile(event)">


  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('service-worker.js');
    }

    function loadFile(e) {
      const file = e.target.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = evt => {
        let text = evt.target.result;

        // Detect Apple .webarchive
        const isWebArchive =
          text.startsWith("bplist") ||
          text.includes("<plist") ||
          text.includes("<dict>");

        if (isWebArchive) {
          // Remove null bytes and control chars
          text = text.replace(/[\x00-\x09\x0B-\x1F]/g, "");

          // Extract ALL <string>...</string> blocks
          const matches = [...text.matchAll(/<string>([\s\S]*?)<\/string>/g)];

          if (matches.length > 0) {
            // Concatenate extracted HTML segments
            text = matches.map(m => m[1]).join("");

            // Unescape HTML entities
            text = text
              .replace(/&lt;/g, "<")
              .replace(/&gt;/g, ">")
              .replace(/&amp;/g, "&");

            // Remove leftover plist/xml tags
            text = text.replace(/<\/?(plist|dict|array|key)[^>]*>/g, "");
          }

          // Heuristic repair if HTML still malformed
          const htmlStart = text.indexOf("<html");
          if (htmlStart !== -1) {
            text = text.substring(htmlStart);
          }

          const htmlEnd = text.lastIndexOf("</html>");
          if (htmlEnd !== -1) {
            text = text.substring(0, htmlEnd + 7);
          }
        }

        // Replace the entire app with the uploaded HTML
        document.open();
        document.write(text);
        document.close();
      };

      reader.readAsText(file);
    }
  </script>
</body>
</html>
