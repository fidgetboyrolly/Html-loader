<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>HTML Loader</title>
  <meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#000">
  <style>
    body {
      margin: 0;
      background: #000;
      color: #fff;
      font-family: system-ui, sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
    }
    input {
      margin-top: 12px;
    }
  </style>
</head>
<body>
  <h2>HTML Loader</h2>
  <p>Select an HTML or WebArchive file:</p>
  <input type="file" accept="*/*" onchange="loadFile(event)">

  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('service-worker.js');
    }

    function loadFile(e) {
      const file = e.target.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = evt => {
        let text = evt.target.result;

        // Detect obvious webarchive/plist wrapper
        const looksLikeWebArchive =
          text.startsWith("bplist") ||
          text.includes("<plist") ||
          text.includes("<dict>");

        if (looksLikeWebArchive) {
          // Strip control chars / nulls
          text = text.replace(/[\x00-\x09\x0B-\x1F]/g, "");

          // Keep only the actual HTML document
          let start = text.indexOf("<!DOCTYPE");
          if (start === -1) start = text.indexOf("<html");
          if (start === -1) start = text.indexOf("<body");

          if (start !== -1) {
            text = text.substring(start);
          }

          const end = text.lastIndexOf("</html>");
          if (end !== -1) {
            text = text.substring(0, end + 7);
          }
        }

        document.open();
        document.write(text);
        document.close();
      };

      reader.readAsText(file);
    }
  </script>
</body>
</html>
