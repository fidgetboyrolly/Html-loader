<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>HTML Loader</title>
  <meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#000">
  <style>
    body {
      margin: 0;
      background: #000;
      color: #fff;
      font-family: system-ui, sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
    }
    input {
      margin-top: 12px;
    }
  </style>
</head>
<body>
  <h2>HTML Loader</h2>
  <p>Select an HTML or WebArchive file:</p>
  <input type="file" accept="*/*" onchange="loadFile(event)">

  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('service-worker.js');
    }

    function loadFile(e) {
      const file = e.target.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = evt => {
        let raw = evt.target.result;
        let text = raw;

        // Detect .webarchive
        const isWebArchive =
          raw.startsWith("bplist") ||
          raw.includes("<plist") ||
          raw.includes("<dict>");

        if (isWebArchive) {
          // PASS 1 — Remove null bytes and control chars
          raw = raw.replace(/[\x00-\x09\x0B-\x1F]/g, "");

          let extracted = "";

          // PASS 2 — Extract ALL <string> blocks
          const stringBlocks = [...raw.matchAll(/<string>([\s\S]*?)<\/string>/g)];
          for (const block of stringBlocks) {
            extracted += block[1] + "\n";
          }

          // PASS 3 — Extract ALL <data> blocks (base64)
          const dataBlocks = [...raw.matchAll(/<data>([\s\S]*?)<\/data>/g)];
          for (const block of dataBlocks) {
            try {
              const decoded = atob(block[1].trim());
              extracted += decoded + "\n";
            } catch (e) {
              // ignore invalid base64
            }
          }

          // If nothing extracted, fallback to raw
          if (!extracted.trim()) extracted = raw;

          // PASS 4 — Unescape HTML entities
          extracted = extracted
            .replace(/&lt;/g, "<")
            .replace(/&gt;/g, ">")
            .replace(/&amp;/g, "&")
            .replace(/&quot;/g, "\"")
            .replace(/&#39;/g, "'");

          // PASS 5 — Remove plist/xml tags
          extracted = extracted.replace(/<\/?(plist|dict|array|key|data|string)[^>]*>/g, "");

          // PASS 6 — Remove leftover garbage before <html>
          const htmlStart = extracted.indexOf("<html");
          if (htmlStart !== -1) {
            extracted = extracted.substring(htmlStart);
          }

          // PASS 7 — Remove leftover garbage after </html>
          const htmlEnd = extracted.lastIndexOf("</html>");
          if (htmlEnd !== -1) {
            extracted = extracted.substring(0, htmlEnd + 7);
          }

          // PASS 8 — If still malformed, try to find <body>
          if (!extracted.includes("<html")) {
            const bodyStart = extracted.indexOf("<body");
            if (bodyStart !== -1) {
              extracted = "<html>" + extracted.substring(bodyStart) + "</html>";
            }
          }

          text = extracted;
        }

        // Replace the entire app with the uploaded HTML
        document.open();
        document.write(text);
        document.close();
      };

      reader.readAsText(file);
    }
  </script>
</body>
</html>
