<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>HTML Loader</title>
  <meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#000">
  <style>
    body {
      margin: 0;
      background: #000;
      color: #fff;
      font-family: system-ui, sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
    }
    input {
      margin-top: 12px;
    }
  </style>
</head>
<body>
  <h2>HTML Loader</h2>
  <p>Select an HTML or WebArchive file:</p>
  <input type="file" accept="*/*" onchange="loadFile(event)">

  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('service-worker.js');
    }

    function loadFile(e) {
      const file = e.target.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = evt => {
        let raw = evt.target.result;

        // Remove null bytes and control chars
        raw = raw.replace(/[\x00-\x09\x0B-\x1F]/g, "");

        // Find the first real HTML/JS token
        const markers = [
          "<!DOCTYPE",
          "<html",
          "<head",
          "<body",
          "<script",
          "<div",
          "/*",        // your file starts with JS comments
          "//",        // JS comment start
          "<",         // any HTML tag
        ];

        let start = -1;
        for (const m of markers) {
          const idx = raw.indexOf(m);
          if (idx !== -1 && (start === -1 || idx < start)) {
            start = idx;
          }
        }

        // If we found a valid start, strip everything before it
        let cleaned = start !== -1 ? raw.substring(start) : raw;

        // Also trim anything after </html>
        const end = cleaned.lastIndexOf("</html>");
        if (end !== -1) {
          cleaned = cleaned.substring(0, end + 7);
        }

        // Replace the entire app with the uploaded HTML
        document.open();
        document.write(cleaned);
        document.close();
      };

      reader.readAsText(file);
    }
  </script>
</body>
</html>
