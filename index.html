<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>HTML Loader</title>
  <meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#000">
  <style>
    body {
      margin: 0;
      background: #000;
      color: #fff;
      font-family: system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      height: 100vh;
      justify-content: center;
      align-items: center;
      text-align: center;
    }
    input {
      margin-top: 12px;
    }
  </style>
</head>
<body>
  <h2>HTML Loader</h2>
  <p>Select an HTML file to replace this page:</p>
  <input type="file" accept=".html,.htm" onchange="loadFile(event)">

  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('service-worker.js');
    }

    function loadFile(e) {
      const file = e.target.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = evt => {
        // Replace the entire current page with the uploaded HTML
        document.open();
        document.write(evt.target.result);
        document.close();
      };
      reader.readAsText(file);
    }
  </script>
</body>
</html>
