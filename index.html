<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>HTML Loader</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#000">
</head>
<body>
  <h1>HTML Loader</h1>
  <p>Select an HTML file from your device:</p>

  <input type="file" accept=".html,.htm" onchange="loadFile(event)">

  <iframe id="viewer" style="width:100%;height:80vh;border:1px solid #ccc;"></iframe>

  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('service-worker.js');
    }

    function loadFile(e) {
      const file = e.target.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = function(evt) {
        document.getElementById('viewer').srcdoc = evt.target.result;
      };
      reader.readAsText(file);
    }
  </script>
</body>
</html>
